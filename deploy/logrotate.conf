# gmo-bot-safe logrotate 設定例
# 配置先例: /etc/logrotate.d/gmo-bot-safe
# Python 側でも TimedRotatingFileHandler で日次ローテートするので、
# 以下は二重の保険 + 圧縮用途。

/home/USER/gmo-bot-safe/logs/*.log {
    daily
    rotate 14
    compress
    delaycompress
    missingok
    notifempty
    copytruncate
}

# 観察ログ（JSONL）も古いものは圧縮しておく（アプリ側はローテートのみ担当）。
/home/USER/gmo-bot-safe/data/score_log/*.jsonl {
    daily
    rotate 60
    compress
    delaycompress
    missingok
    notifempty
    nocreate
}
