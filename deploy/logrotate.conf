# gmo-bot-safe logrotate 設定
# 配置先例: /etc/logrotate.d/gmo-bot-safe

# bot.log 系のみ logrotate で管理 (内容追記型なのでローテート必要)。
/home/USER/gmo-bot-safe/logs/*.log {
    daily
    rotate 14
    compress
    delaycompress
    missingok
    notifempty
    copytruncate
}

# score_log/*.jsonl は **logrotate しない**。
#
# 理由 (2026-05-17 事故対応):
#   アプリ側で `<YYYY-MM-DD>.jsonl` 形式の日付ファイル名を使い、日次で新ファイル
#   を作成する設計。logrotate を当てると、日付ファイルがさらに `.jsonl.1` に
#   rotate され、aggregate.py の glob (`<date>.jsonl`) から外れて集計対象が
#   壊れる事故が発生した (Phase 2 観察で `--days 13` の結果が偽の "100%
#   regime_blocked, 0 trades" を出した原因)。
#
#   ストレージ消費は日次 244KB × 365日 = ~90MB/年 で許容範囲。
#   compare_old 側も同じ理由でローテート対象外とする。
