# =============================================================================
# BALANCED CHAMPION: BTC+ETH + NDX trend filter (2026-04-15 探索セッション, trial 8545)
# -----------------------------------------------------------------------------
# 10K-trial 多銘柄探索で発見。複利運用 10K → 31,511 円 (3.15×) / DD 14.3%
# リスク調整済みで最も「自動化に向く」構成。
#
# 期間別内訳 (2022-01 〜 2026-03, fee 0.05% 込み):
#   train_extra 2022-01..2023-12: PF 1.49 / trades 83
#   train       2024-01..2025-06: PF 1.71 / trades 75
#   val         2025-07..2025-12: PF 2.46 / trades 22
#   final       2026-01..2026-03: PF 2.16 / trades 10
#   trades total: 190
#
# 複利 10K 円運用: 31,511 円 (3.15×), DD 14.3%
#
# vs trial 4988 (aggressive, 3.76× DD 20.3%):
#   倍率は 4988 が勝つが、DD 6 pt 低く、自動化で精神的に楽
# =============================================================================

exchange: gmo_coin
market: spot
mode: dry_run

symbols:
  core: [BTC_JPY, ETH_JPY]
  satellite: []

limits:
  max_watch: 5
  max_positions: 1          # 多銘柄同時保有 1 本 (コア集中)
  min_cash_ratio: 0.20
  max_core_ratio: 0.50
  max_sat_ratio: 0.25

loop:
  watch_interval_sec: 300
  score_interval_sec: 300
  max_orders_per_cycle: 1

scorer:
  ai_enabled: true
  ai_weight: 0.3
  rule_weight: 0.7
  base_score: 60.0

  trend:
    short_ma: 6
    long_ma: 44
    ratio_clamp: 0.05
    max_magnitude: 30.0

  liquidity:
    window: 10
    volume_divisor: 5.0
    max_score: 20.0

  heat:
    window: 5
    up_threshold_pct: 5.0
    down_threshold_pct: 5.0
    up_scale_pct: 10.0
    down_scale_pct: 10.0
    up_max_penalty: 20.0
    down_max_penalty: 10.0
    neutral_bonus: 5.0

  dup_penalty:
    same_symbol: -15.0
    same_group: -5.0

  thresholds:
    buy_candidate:
      total: 70
      trend: 10
      liquidity: 0
      heat: -8
    strong_buy:
      total: 78
      trend: 15
      liquidity: 5
      heat: -5
    dup_penalty_block: -8

exits:
  stop_loss_pct: -4.0
  take_profit_pct: 7.0
  trail_pct: 3.0              # ← 未実装 (要 src/ 改修)
  max_hold_bars: 288          # ← 未実装 (要 src/ 改修, 5min×288=24h)
  cooldown_min: 180

regime_filter:
  enabled: true
  ndx_trend:                  # NASDAQ100 短期 MA (5) > 長期 MA (10)
    enabled: true
    csv_path: ./data/market/NDX_d.csv
    ma_short: 5
    ma_long: 10

risk:
  halt_on_error: true
  halt_on_price_gap_pct: 10.0
  max_consecutive_errors: 5
  per_trade_jpy_max: 10000
  block_buy_below_cash_ratio: 0.20
  stop_file: ./STOP
  auto_resume: false

portfolio:
  initial_cash_jpy: 1000000

notifier:
  enabled: false
  on_halt: true
  on_order: true
  on_error: true

logging:
  level: INFO
  dir: ./logs
  backup_count: 14
